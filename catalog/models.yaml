# Devproof AI curated model catalog.
#
# HOW TO CONFIGURE THIS CATALOG
#   Each entry is one deployable (family × size × quantization). Add/edit entries
#   here and restart the control plane (or, once packaged, it hot-reloads).
#   Custom/private models: point `source` at any HuggingFace resolve URL (GGUF)
#   or repo (safetensors); set `recommendedEngine` (llama.cpp for GGUF, vllm for
#   safetensors). Per-workspace overrides can be layered later.
#
# SCHEMA (per entry)
#   id, family, displayName, parameters, format(gguf|safetensors), quantization,
#   source, license, recommendedEngine, toolCalling(strong|basic|none),
#   contextTokens, requirements{vramGB,diskGB,gpus}
#   resources{cpu,memory}: MANDATORY per-replica k8s requests (deploy prefill;
#     assignment rule in docs/superpowers/specs/2026-07-16-deployment-resources-design.md)
#   capacityProfiles[]: one per hardware option the UI offers:
#     gpuType, instanceType, gpusPerReplica, vramGB, estTokensPerSec
#
# INSTANCE REFERENCE
#   cpu-4vcpu      : CPU only
#   g4dn.xlarge    : 1× NVIDIA T4  16 GB
#   g5.xlarge      : 1× NVIDIA A10G 24 GB
#   g6e.xlarge     : 1× NVIDIA L40S 48 GB
#   a100-80gb x1   : 1× NVIDIA A100 80 GB
#   a100-80gb x2   : 2× NVIDIA A100 80 GB
#   a100-80gb x4   : 4× NVIDIA A100 80 GB
#   h100-80gb x8   : 8× NVIDIA H100 80 GB

