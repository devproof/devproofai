{{- if .Values.controlplane.enabled }}
{{- range $ns := (list $.Release.Namespace (include "devproof.gatewayNamespace" $) (include "devproof.servingNamespace" $) | uniq) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devproof-controlplane
  namespace: {{ $ns }}
rules:
  - apiGroups: [""]
    resources: [configmaps, secrets, services]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/exec]
    # BOTH verbs: kubectl execs via SPDY/POST (verb "create"), but
    # @kubernetes/client-node execs over websocket, which the apiserver
    # authorizes as GET — without "get" the CP's download-progress exec
    # 403s while kubectl-as-SA works (live-debugged 2026-07-23).
    verbs: [create, get]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, create, update, patch, delete]
  - apiGroups: [serving.devproof.ai]
    resources: [modelpools, modeldeployments]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [inference.llmkube.dev]
    resources: [models]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devproof-controlplane
  namespace: {{ $ns }}
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: devproof-controlplane }
subjects:
  - { kind: ServiceAccount, name: devproof-controlplane, namespace: {{ $.Release.Namespace }} }
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devproof-controlplane
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devproof-controlplane
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: devproof-controlplane }
subjects:
  - { kind: ServiceAccount, name: devproof-controlplane, namespace: {{ .Release.Namespace }} }
{{- end }}
