{{- /* Chart-managed pull secret for whatever registry hosts the platform
images (ghcr.io/devproof by default; customers may run their own registry or
mirror — see registryAuth in values.yaml). Rendered in the release namespace
AND the agents namespace (session-runner Jobs and egress proxies run there).
Skipped entirely when registryAuth is unconfigured (public registry — no pull
secrets anywhere) or with existingSecret (then BOTH copies are the operator's
responsibility). */}}
{{- if and .Values.registryAuth.token (not .Values.registryAuth.existingSecret) }}
{{- $auth := printf "%s:%s" .Values.registryAuth.username .Values.registryAuth.token | b64enc }}
{{- $cfg := dict "auths" (dict .Values.registryAuth.registry (dict "auth" $auth)) | toJson }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.registryAuth.secretName }}
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $cfg | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.registryAuth.secretName }}
  namespace: {{ .Values.agents.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $cfg | b64enc }}
{{- end }}
