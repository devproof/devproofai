{{- if and .Values.operator.enabled .Values.llmkube.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devproof-operator
  {{- with .Values.operator.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.operator.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "devproof.app" "operator" }}
  template:
    metadata:
      labels:
        app: {{ include "devproof.app" "operator" }}
        {{- with .Values.operator.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.operator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: devproof-operator
      {{- include "devproof.podScheduling" .Values.operator | nindent 6 }}
      {{- include "devproof.pullSecrets" $ | nindent 6 }}
      containers:
        - name: operator
          image: {{ include "devproof.image" .Values.operator.image }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          env:
            {{- with .Values.operator.engineImage.cpu }}{{- if .repository }}
            - { name: DEVPROOF_ENGINE_IMAGE, value: {{ include "devproof.image" . | quote }} }
            {{- end }}{{- end }}
            {{- with .Values.operator.engineImage.gpu }}{{- if .repository }}
            - { name: DEVPROOF_ENGINE_IMAGE_GPU, value: {{ include "devproof.image" . | quote }} }
            {{- end }}{{- end }}
            # DEVPROOF_IMAGE_PULL_SECRET (→ ISVC spec.imagePullSecrets) is
            # deliberately NOT set: LLMkube 0.9.7 flaps the field out of the
            # engine template (same dead end as spec.image — deploy/README),
            # churning pods forever. Engine pods use public images instead;
            # the transform seam stays for when upstream is deterministic.
            {{- if .Values.operator.controlPlaneUrl }}
            - { name: DEVPROOF_CONTROL_PLANE_URL, value: {{ .Values.operator.controlPlaneUrl | quote }} }
            {{- else if .Values.controlplane.enabled }}
            - { name: DEVPROOF_CONTROL_PLANE_URL, value: http://controlplane.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.controlplane.service.port }} }
            {{- end }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
{{- end }}
