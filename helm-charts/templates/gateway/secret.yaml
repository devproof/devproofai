{{- if not .Values.gateway.auth.existingSecret }}
# LiteLLM master key — generated once and stable across upgrades (the
# stableSecretValue lookup re-reads the live Secret). Under `helm template`
# (no cluster) the generated value is empty unless masterKey is fixed.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-master-key
type: Opaque
data:
  master-key: {{ include "devproof.stableSecretValue" (dict "root" $ "secret" "gateway-master-key" "key" "master-key" "value" .Values.gateway.auth.masterKey) }}
{{- end }}
