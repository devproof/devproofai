{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devproof-pg-data
  annotations:
    # Survive helm uninstall: this PVC holds the platform database. Helm
    # orphans it instead of deleting; a reinstall under the same release
    # name reattaches it. Delete manually to actually drop the data.
    helm.sh/resource-policy: keep
spec:
  accessModes: [ReadWriteOnce]
  {{- with .Values.postgres.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
{{- end }}
