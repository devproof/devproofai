model_list:
  - model_name: qwen05b-dp
    litellm_params:
      model: openai/qwen05b-dp
      api_base: http://qwen05b-dp.devproof-serving.svc.cluster.local:8080/v1
      api_key: none
    model_info:
      devproof_sanitize: true
