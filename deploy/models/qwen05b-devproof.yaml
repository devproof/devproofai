# Same model as deploy/models/qwen05b.yaml, but deployed through Devproof CRDs
# (ModelPool + ModelDeployment) reconciled by the Devproof operator.
apiVersion: serving.devproof.ai/v1alpha1
kind: ModelPool
metadata: { name: cpu-default, namespace: devproof-serving }
spec:
  gpuType: cpu
  scalingMode: static
---
apiVersion: serving.devproof.ai/v1alpha1
kind: ModelDeployment
metadata: { name: qwen05b-dp, namespace: devproof-serving }
spec:
  model:
    source: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf
    format: gguf
  catalogId: qwen2.5-0.5b-instruct-q4
  poolRef: cpu-default
  engine: auto
  replicas: { min: 1, max: 2 }
  resources: { cpu: "2", memory: "2Gi" }
  targetTokensPerSec: 20
