# Manual PyPI release of the Python client (python-client/ -> devproofai-client).
# No git tag: the version comes solely from the dispatch input, injected via
# SETUPTOOLS_SCM_PRETEND_VERSION (pyproject.toml versions from setuptools-scm,
# which this env var overrides — no tag lookup happens).
name: release-pypi

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PyPI version (e.g. 0.2.0 — no v prefix; a leading v is stripped)"
        required: true

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: validate + normalize version
        run: |
          v="${{ inputs.version }}"
          v="${v#v}"
          [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.]+)?$ ]] \
            || { echo "version must look like 0.2.0 (got: ${{ inputs.version }})"; exit 1; }
          echo "VERSION=$v" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v6   # v5 targets Node 20 (deprecated on runners)
        with:
          python-version: "3.x"
      - name: build sdist + wheel
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.VERSION }}
        run: |
          python -m pip install build
          python -m build python-client
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: python-client/dist
