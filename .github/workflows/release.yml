# Release from an existing tag (no automatic publishing off main — user
# decision 2026-07-19). This workflow does NOT create tags: bump-version.yml
# stamps the version, pushes the tag, and dispatches this workflow on it (a
# GITHUB_TOKEN tag push can't fire the tags trigger below — that trigger only
# catches manually pushed tags). Builds all five images FROM the tag
# (scripts/version.sh must resolve to it) for linux/amd64 + linux/arm64 via
# the SAME docker-bake.hcl as scripts/build.sh — keep it that way. The
# platform override lives here (not in the bake file) so local builds stay
# native single-arch.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # dispatched on a tag ref by bump-version.yml

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # arm64 builds run under QEMU emulation
    env:
      VERSION: ${{ github.ref_name }}   # the tag this run fired on
      NODE_OPTIONS: "--disable-warning=DEP0040 --disable-warning=DEP0169"
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }   # version.sh needs tags + history
      - name: validate version
        # Also rejects a workflow_dispatch off a branch ref — this workflow
        # only runs on tags.
        run: |
          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] \
            || { echo "ref must be a version tag like v0.2.0 (got: $VERSION)"; exit 1; }
      - name: version from tag
        # Build version comes from git (single source of truth) and must equal
        # the triggering tag — catches a commit carrying a different tag.
        run: |
          v="$(scripts/version.sh)"
          [ "$v" = "$VERSION" ] \
            || { echo "scripts/version.sh resolved $v, expected $VERSION"; exit 1; }
      - uses: docker/setup-qemu-action@v4   # v3 targets Node 20 (deprecated on runners)
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: bake (multi-arch build + push)
        env:
          REVISION: ${{ github.sha }}
          REGISTRY: ghcr.io/devproof
        # No floating `latest` tag — images are referenced by pinned version
        # tags only (user decision 2026-07-19).
        run: docker buildx bake --set "*.platform=linux/amd64,linux/arm64" --push
      - uses: azure/setup-helm@v4
      # dependency build resolves Chart.lock but still needs the repo
      # definition (fresh runners have no helm repos).
      - run: helm repo add llmkube https://defilantech.github.io/LLMKube
      - run: helm dependency build helm-charts
      # The upstream llmkube schema rejects the subchart-injected keys
      # 'enabled'/'global' (root additionalProperties:false) — re-package the
      # vendored tgz with them allowed so installs of the RELEASED chart don't
      # need --skip-schema-validation. Must run after dependency build (which
      # restores the pristine upstream tgz).
      - run: scripts/patch-llmkube-schema.sh
      - name: package + push chart (ghcr.io/devproof/devproofai-helm)
        # The OCI repo name comes from the chart name in Chart.yaml
        # (devproofai-helm); the version overrides Chart.yaml's at package time.
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package helm-charts --version "$VERSION" --app-version "$VERSION" -d /tmp
          helm push "/tmp/devproofai-helm-$VERSION.tgz" oci://ghcr.io/devproof
